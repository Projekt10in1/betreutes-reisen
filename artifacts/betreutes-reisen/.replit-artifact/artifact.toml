kind = "web"
previewPath = "/"
title = "betreutes-reisen.org"
version = "1.0.0"
id = "artifacts/betreutes-reisen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18638

[services.development]
run = "pnpm --filter @workspace/betreutes-reisen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/betreutes-reisen", "run", "build" ]
publicDir = "artifacts/betreutes-reisen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18638"
BASE_PATH = "/"
